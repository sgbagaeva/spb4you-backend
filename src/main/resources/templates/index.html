<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Cloud Storage Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .upload-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px dashed #667eea;
        }

        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-actions a, .file-actions button {
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .empty-state i {
            font-size: 4em;
            color: #ddd;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>☁️ VK Cloud Storage Manager</h1>
        <p>Управляйте вашими файлами в облаке просто и удобно</p>
    </div>

    <div class="content">
        <!-- Сообщения об успехе/ошибке -->
        <div th:if="${message}" th:class="${'alert alert-' + messageType}">
            <span th:text="${message}"></span>
        </div>

        <!-- Секция загрузки файла -->
        <div class="upload-section">
            <h2>📤 Загрузить новый файл</h2>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <input type="file" name="file" required accept="*/*">
                </div>
                <button type="submit" class="btn btn-primary">Загрузить файл</button>
            </form>
        </div>

        <!-- Статистика -->
        <div class="stats-card">
            <h3 th:text="${totalFiles}">0</h3>
            <p>Всего файлов в хранилище</p>
        </div>

        <!-- Список файлов -->
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Имя файла</th>
                    <th>Размер</th>
                    <th>Дата изменения</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="file : ${files}">
                    <td th:text="${file.fileName}">file.txt</td>
                    <td>
                                <span th:if="${file.fileSize < 1024}"
                                      th:text="${file.fileSize} + ' B'"></span>
                        <span th:if="${file.fileSize >= 1024 and file.fileSize < 1048576}"
                              th:text="${#numbers.formatDecimal(file.fileSize / 1024, 1, 2)} + ' KB'"></span>
                        <span th:if="${file.fileSize >= 1048576}"
                              th:text="${#numbers.formatDecimal(file.fileSize / 1048576, 1, 2)} + ' MB'"></span>
                    </td>
                    <td th:text="${file.lastModified}">2024-01-01</td>
                    <td class="file-actions">
                        <a th:href="@{/download/{fileName}(fileName=${file.fileName})}"
                           class="btn-success"
                           style="color: white; text-decoration: none;">
                            📥 Скачать
                        </a>
                        <form th:action="@{/delete/{fileName}(fileName=${file.fileName})}"
                              method="post"
                              style="display: inline;"
                              onsubmit="return confirm('Вы уверены, что хотите удалить этот файл?');">
                            <button type="submit" class="btn-danger">🗑️ Удалить</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${files.empty}">
                    <td colspan="4" class="empty-state">
                        <i>📁</i>
                        <h3>Хранилище пусто</h3>
                        <p>Загрузите первый файл, используя форму выше</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
